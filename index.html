<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Image Steganography</title>

<style>
body{
font-family: Arial;
max-width:700px;
margin:auto;
padding:20px;
}

h2{
margin-top:30px;
}

button{
padding:8px 15px;
margin-top:10px;
}

input{
margin-top:5px;
}
</style>

</head>

<body>

<h1>Image Steganography Demo</h1>

<h2>Encode (Hide File)</h2>

<input type="file" id="cover"><br><br>
<input type="file" id="secret"><br><br>

<input type="password" id="pass" placeholder="Passcode"><br><br>

<button onclick="encode()">Encode</button>

<p id="encodeStatus"></p>

<hr>

<h2>Decode (Extract File)</h2>

<input type="file" id="encodedImage"><br><br>

<input type="password" id="decodePass" placeholder="Passcode"><br><br>

<button onclick="decode()">Decode</button>

<p id="decodeStatus"></p>

<script>

function encode(){

let cover = document.getElementById("cover").files[0]
let secret = document.getElementById("secret").files[0]
let pass = document.getElementById("pass").value

if(!cover || !secret){
alert("Select files first")
return
}

let reader1 = new FileReader()
let reader2 = new FileReader()

reader1.onload = function(){

let coverData = new Uint8Array(reader1.result)

reader2.onload = function(){

let secretData = new Uint8Array(reader2.result)

let marker = new TextEncoder().encode("STEGO_START_"+pass+"_")

let merged = new Uint8Array(
coverData.length + marker.length + secretData.length
)

merged.set(coverData,0)
merged.set(marker,coverData.length)
merged.set(secretData,coverData.length + marker.length)

let blob = new Blob([merged])

let link = document.createElement("a")
link.href = URL.createObjectURL(blob)
link.download = "encoded_image.png"
link.click()

document.getElementById("encodeStatus").innerText =
"File hidden successfully"

}

reader2.readAsArrayBuffer(secret)

}

reader1.readAsArrayBuffer(cover)

}



function decode(){

let encoded = document.getElementById("encodedImage").files[0]
let pass = document.getElementById("decodePass").value

let reader = new FileReader()

reader.onload = function(){

let data = new Uint8Array(reader.result)

let marker = new TextEncoder().encode("STEGO_START_"+pass+"_")

let markerIndex = -1

for(let i=0;i<data.length-marker.length;i++){

let match=true

for(let j=0;j<marker.length;j++){

if(data[i+j]!==marker[j]){
match=false
break
}

}

if(match){
markerIndex=i+marker.length
break
}

}

if(markerIndex==-1){
alert("Wrong passcode or no hidden file")
return
}

let hidden = data.slice(markerIndex)

let blob = new Blob([hidden])

let link = document.createElement("a")
link.href = URL.createObjectURL(blob)
link.download = "recovered_file"
link.click()

document.getElementById("decodeStatus").innerText =
"File extracted successfully"

}

reader.readAsArrayBuffer(encoded)

}

</script>

</body>
</html>
